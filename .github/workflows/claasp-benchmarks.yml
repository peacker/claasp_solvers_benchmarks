name: CLAASP Benchmarks

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_nightly:
        description: "Run nightly benchmarks"
        type: boolean
        default: false
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-report-site:
    runs-on: ubuntu-latest
    env:
      CLAASP_DOCKER_IMAGE: ${{ vars.CLAASP_DOCKER_IMAGE || 'tiicrc/claasp-base:latest' }}
      CLAASP_SOURCE_DIR: claasp
    steps:
      - uses: actions/checkout@v4
      - name: Checkout CLAASP source
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: Crypto-TII/claasp
          path: claasp
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.event.repository.private == false
        uses: actions/configure-pages@v6
      - name: Validate manifests
        run: python -m claasp_bench validate benchmarks
      - name: Run synthetic fixture benchmarks
        run: python -m claasp_bench run benchmarks/fixtures --output fixture-results --runner synthetic --fail-on-benchmark-error
      - name: Seed report results from fixtures
        if: github.event_name == 'pull_request' || (github.event_name != 'workflow_dispatch' && github.event_name != 'schedule' && github.ref != 'refs/heads/main')
        run: python -c "import shutil; shutil.rmtree('results', ignore_errors=True); shutil.copytree('fixture-results', 'results')"
      - name: Check Docker
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        run: docker version
      - name: Pull CLAASP Docker image
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        run: |
          docker pull "$CLAASP_DOCKER_IMAGE"
          docker inspect "$CLAASP_DOCKER_IMAGE" --format='{{index .RepoDigests 0}}' > /tmp/image-digest.txt || echo "$CLAASP_DOCKER_IMAGE" > /tmp/image-digest.txt
      - name: Compute benchmark cache key
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        id: bench-key
        run: |
          BENCH_HASH=$(find benchmarks -name '*.json' | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          IMAGE_REF=$(cat /tmp/image-digest.txt | tr -d '\n' | tr '/:@' '---')
          echo "smoke-key=bench-smoke-${BENCH_HASH}-${IMAGE_REF}" >> "$GITHUB_OUTPUT"
      - name: Restore smoke benchmark results cache
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        id: bench-cache
        uses: actions/cache@v4
        with:
          path: results
          key: ${{ steps.bench-key.outputs.smoke-key }}
      - name: Run CLAASP available-solver sweep (smoke)
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main') && steps.bench-cache.outputs.cache-hit != 'true'
        run: python -m claasp_bench run benchmarks/smoke --output results --runner docker
      - name: Restore nightly benchmark results cache
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        uses: actions/cache/restore@v4
        with:
          path: nightly-results
          key: bench-nightly-never-match
          restore-keys: bench-nightly-
      - name: Run CLAASP nightly benchmarks
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)
        run: python -m claasp_bench run benchmarks/nightly --output nightly-results --runner docker
      - name: Save nightly benchmark results cache
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)
        uses: actions/cache/save@v4
        with:
          path: nightly-results
          key: bench-nightly-${{ github.run_id }}
      - name: Merge nightly results into results
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        run: |
          if [ -f nightly-results/results.jsonl ]; then
            cat nightly-results/results.jsonl >> results/results.jsonl
          fi
      - name: Generate Markdown report
        run: python -m claasp_bench report results --output results/report.md
      - name: Generate static site
        run: python -m claasp_bench site results --output _site
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claasp-benchmark-results
          path: |
            results
            _site
      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.event.repository.private == false
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && github.event.repository.private == false
    needs: validate-report-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy benchmark website
        id: deployment
        uses: actions/deploy-pages@v5
